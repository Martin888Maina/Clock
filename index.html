<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful analog clock built with HTML, CSS, and JavaScript that displays real-time hours, minutes, and seconds.">
    <meta name="author" content="Martin888Maina">
    <title>Analog Clock - Real-Time JavaScript Clock</title>
    <link rel="icon" type="image/png" href="clockface.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Analog Clock</h1>
        <p class="subtitle">Real-time JavaScript clock with smooth animations</p>
    </header>

    <main>
        <div id="clockContainer">
            <div id="clockbg">
                <!-- Clock hands positioned and rotated via JavaScript -->
                <div id="hour" class="hand"></div>
                <div id="minute" class="hand"></div>
                <div id="second" class="hand"></div>
            </div>
            
            <!-- Digital time display for accessibility -->
            <div id="digitalTime"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Martin888Maina. All rights reserved.</p>
    </footer>

    <script>
        // Update clock every second to reflect current time
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // Calculate rotation angles for each hand
            // Hour hand moves 30 degrees per hour plus 0.5 degrees per minute
            const hourRotation = 30 * hours + minutes / 2;
            
            // Minute hand moves 6 degrees per minute
            const minuteRotation = 6 * minutes;
            
            // Second hand moves 6 degrees per second
            const secondRotation = 6 * seconds;
            
            // Apply rotations to clock hands
            document.getElementById('hour').style.transform = `rotate(${hourRotation}deg)`;
            document.getElementById('minute').style.transform = `rotate(${minuteRotation}deg)`;
            document.getElementById('second').style.transform = `rotate(${secondRotation}deg)`;
            
            // Update digital time display for accessibility
            const formattedTime = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('digitalTime').textContent = formattedTime;
        }
        
        // Initialize clock and set interval
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
